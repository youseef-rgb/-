<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>......</title>


<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&family=Marhey:wght@300;400&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

background:
radial-gradient(circle at top,#322653,#10111a 70%);

overflow:hidden;

font-family:Cairo,sans-serif;

}


/* نجوم */

.star{

position:fixed;

width:3px;
height:3px;

background:white;

border-radius:50%;

opacity:.4;

animation:star 5s infinite;

}


@keyframes star{

50%{

opacity:1;

transform:scale(2);

}

}



/* الصفحة */


.container{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

}



/* الظرف */


.envelope{


width:280px;

height:180px;

background:#f2dfb8;

border-radius:12px;

position:relative;

cursor:pointer;

box-shadow:0 25px 60px #0008;

}



.flap{


position:absolute;

width:100%;

height:100%;


background:#e5c995;

clip-path:polygon(0 0,100% 0,50% 55%);


transform-origin:top;

transition:1s;

z-index:2;

}



.seal{


position:absolute;


top:65px;

left:calc(50% - 28px);


width:56px;

height:56px;


border-radius:50%;


background:#5a3b82;


display:flex;

align-items:center;

justify-content:center;


color:white;

font-size:25px;


z-index:3;


}



.open .flap{

transform:rotateX(180deg);

}



.open{

animation:hide 1.5s forwards;

}



@keyframes hide{


to{

opacity:0;

transform:scale(.7);

}

}





/* الورقة */


.paper{


display:none;


width:90%;

max-width:430px;


background:#f7e7c9;


padding:35px 25px;


border-radius:6px;


box-shadow:0 30px 70px #0008;


color:#3b2a1c;


font-family:Marhey,Cairo;



font-size:21px;


line-height:2.2;


animation:showPaper 1.5s;


}


@keyframes showPaper{


from{

opacity:0;

transform:translateY(60px) rotateX(40deg);

}

to{

opacity:1;

transform:none;

}


}




.date{


margin-top:25px;


font-size:14px;


color:#88684a;


}



/* ===== الأرشيف ===== */

.archiveBtn{

position:fixed;

bottom:25px;

right:25px;

width:55px;

height:55px;

border-radius:50%;

border:none;

background:#ffffff22;

color:white;

font-size:25px;

z-index:10;

}


.archive{


position:fixed;


bottom:-100%;


left:0;


width:100%;


height:70%;


background:#151522;


border-radius:30px 30px 0 0;


padding:25px;


transition:.7s;


overflow:auto;


color:white;


z-index:50;


box-shadow:0 -10px 40px #000;


}



.archive.show{

bottom:0;

}



.closeArchive{


background:#ffffff22;

border:none;

color:white;

padding:10px 20px;

border-radius:20px;

margin-bottom:20px;

font-family:inherit;

}




.day{


padding:18px;


border-bottom:1px solid #444;


cursor:pointer;


color:#eee;


}

.audio{


display:none;

text-align:center;

}



</style>

</head>



<body>



<div class="star" style="top:20%;left:20%"></div>
<div class="star" style="top:40%;left:80%"></div>
<div class="star" style="top:70%;left:30%"></div>



<div class="container">



<div class="envelope" id="envelope" onclick="openLetter()">



<div class="flap"></div>


<div class="seal">

✦

</div>


</div>




<div class="paper" id="paper">


<div id="message"></div>


<div class="audio" id="audioBox">


🎧 هذه رسالة صوتية 🤍


<br><br>


<audio controls id="audio"></audio>


</div>



<div class="date" id="date"></div>


</div>


</div>




<button class="archiveBtn" onclick="openArchive()">

📜

</button>




<div class="archive" id="archive">


<button class="closeArchive" onclick="closeArchive()">

إغلاق

</button>


<h2>
الرسائل السابقة
</h2>


<div id="archiveList"></div>


</div>






<script>


/*

هنا تضيف رسائلك اليومية

ضع الجديدة فوق القديمة

type:

text = كتابة

audio = صوت


*/


const messages=[

{
  date:"23 2026",
  type :"audio",
  content: "WhatsApp Ptt 2026-05-13 at 17.56.10.ogg"
            
},

  

{

date:"23 يونيو 2026",

type:"text",

content:

"✨✨كتكوت ابو الليل الحزين✨✨\nانا عارف ان الدنيا دايه عليك دامد 🥺\n بس انا دبمك و مش هسيبك 🙃\n هي solo squad بس ممكن نخليها  Duo Squad 😁😁"


},



{

date:"22 يونيو 2026",

type:"text",

content:

"حتى الأيام الصعبةبتعدي، خدي نفس واهدئي، أنتِ أقوى مما تتخيلي."


}


];





function showMessage(item){


document.getElementById("message").innerHTML="";

document.getElementById("audioBox").style.display="none";



if(item.type==="text"){


document.getElementById("message").innerText=item.content;


}



else{


document.getElementById("audioBox").style.display="block";


document.getElementById("audio").src=item.content;


}



document.getElementById("date").innerText=item.date;


}






function openLetter(){


let env=document.getElementById("envelope");


env.classList.add("open");



setTimeout(()=>{


env.style.display="none";


document.getElementById("paper").style.display="block";


showMessage(messages[0]);



localStorage.setItem("opened","true");


},1200);


}






function openArchive(){


document
.getElementById("archive")
.classList.add("show");


let list=document.getElementById("archiveList");

list.innerHTML="";



for(let i=1;i<messages.length;i++){


list.innerHTML += `

<div class="day" onclick="oldMessage(${i})">

${messages[i].date}

</div>

`;

}



}




function closeArchive(){


document
.getElementById("archive")
.classList.remove("show");


}





function oldMessage(i){


showMessage(messages[i]);


closeArchive();


}




function oldMessage(i){


showMessage(messages[i]);


document
.getElementById("archive")
.classList.remove("show");


}



</script>


</body>

</html>
